<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>اطلاعیه</title>

<style>
html,body{
    margin:0;
    width:100%;
    min-height:100%;
    background:#111;
    color:#fff;
    font-family:Tahoma,sans-serif;
    overflow-x:hidden;
}

.container{
    max-width:500px;
    margin:auto;
    padding:20px;
    text-align:center;
}

img{
    width:100%;
    border-radius:20px;
    margin-bottom:20px;
}

.card{
    background:#1c1c1c;
    padding:25px;
    border-radius:20px;
    box-shadow:0 0 20px rgba(0,0,0,.4);
    line-height:2;
    font-size:22px;
}

.title{
    color:#e0e0e0;
    font-size:28px;
    font-weight:bold;
    margin-bottom:15px;
}
</style>
</head>
<body>

<div class="container">
    <img src="IMG_20260616_231919_114.jpg" alt="مرحوم کربلایی حبیب اله مژدی">

    <div class="card">
        <div class="title">⚫️ فوت بنّای پروژه ساخت ورزشگاه اختصاصی در فرهاد</div>

        شادروان <strong>کربلایی حبیب‌اله مژدی</strong><br><br>

        این پروژه به مدت <strong>۲ ماه</strong> به تعویق افتاد.
    </div>
</div>

</body>
</html>
