<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>خبر فوری</title>

<style>
html,body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:#111;
    font-family:Tahoma,sans-serif;
}

.container{
    width:100%;
    height:100%;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
    box-sizing:border-box;
}

.news{
    background:#1e1e1e;
    color:#fff;
    border-right:6px solid #ff0000;
    padding:25px;
    border-radius:20px;
    font-size:24px;
    line-height:2;
    text-align:right;
    box-shadow:0 0 20px rgba(0,0,0,0.4);
}
</style>
</head>
<body>

<div class="container">
    <div class="news">
        🔴⚫️ <b>#فوری</b><br><br>
        ساخت ورزشگاه در فرهاد به علت فوت بنای این پروژه، استا حبیب،
        حدود ۲ ماه به تعویق افتاد.
    </div>
</div>

</body>
</html>
