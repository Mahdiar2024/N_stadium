<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>خبر فوری</title>

<style>
html,body{
    margin:0;
    background:#111;
    color:#fff;
    font-family:Tahoma,sans-serif;
    overflow-x:hidden;
}

.container{
    max-width:500px;
    margin:auto;
    padding:20px;
}

img{
    width:100%;
    border-radius:20px;
    display:block;
    margin-bottom:20px;
}

.card{
    background:#1c1c1c;
    padding:25px;
    border-radius:20px;
    line-height:2;
    box-shadow:0 0 20px rgba(0,0,0,.5);
}

.title{
    color:#ff3b3b;
    font-size:26px;
    font-weight:bold;
    margin-bottom:15px;
}

.footer{
    margin-top:20px;
    color:#ccc;
    font-size:18px;
}
</style>
</head>
<body>

<div class="container">

    <img src="https://mahdiar2024.github.io/N_stadium/IMG_20260616_232540_720.jpg" alt="خبر">

    <div class="card">
        <div class="title">🔴 خبر فوری</div>

        دقایقی پیش مدیر عامل، نیشابور را به مقصد لس‌آنجلس ترک کرد تا جلسه‌ای با اینفانتینو رئیس فیفا داشته باشد.

        <div class="footer">
            🌐 روابط عمومی باشگاه ستاره سرخ فرهاد
        </div>
    </div>

</div>

</body>
</html>
