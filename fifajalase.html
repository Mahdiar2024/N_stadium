<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>خبر رسمی</title>

<style>
html,body{
    margin:0;
    background:#111;
    color:#fff;
    font-family:Tahoma,sans-serif;
    overflow-x:hidden;
}

.container{
    max-width:500px;
    margin:auto;
    padding:20px;
}

img{
    width:100%;
    border-radius:20px;
    display:block;
    margin-bottom:20px;
    box-shadow:0 0 20px rgba(0,0,0,.5);
}

.card{
    background:#1c1c1c;
    padding:25px;
    border-radius:20px;
    line-height:2;
    box-shadow:0 0 20px rgba(0,0,0,.5);
}

.title{
    color:#ff3b3b;
    font-size:28px;
    font-weight:bold;
    margin-bottom:15px;
}

.footer{
    margin-top:20px;
    color:#ccc;
    font-size:18px;
}
</style>
</head>
<body>

<div class="container">

    <img src="https://cdn.imgurl.ir/uploads/t069186_IMG_20260616_232828_425.jpg" alt="تصویر جلسه">

    <div class="card">
        <div class="title">🖼 #رسمی</div>

        تصویری از جلسه مدیرعامل و اینفانتینو رئیس فیفا.

        <div class="footer">
            🌐 مدیر امور خارجه، لس‌آنجلس
        </div>
    </div>

</div>

</body>
</html>
