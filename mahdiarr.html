<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>مصاحبه رسمی</title>

<style>
html,body{
    margin:0;
    background:#111;
    color:#fff;
    font-family:Tahoma,sans-serif;
    overflow-x:hidden;
}

.container{
    max-width:500px;
    margin:auto;
    padding:20px;
}

.card{
    background:#1c1c1c;
    padding:25px;
    border-radius:20px;
    box-shadow:0 0 20px rgba(0,0,0,.5);
}

.title{
    color:#ff3b3b;
    font-size:26px;
    font-weight:bold;
    margin-bottom:15px;
}

.text{
    font-size:20px;
    line-height:2;
    margin-bottom:20px;
}

audio{
    width:100%;
    border-radius:15px;
}

.footer{
    margin-top:20px;
    color:#ccc;
    text-align:center;
    font-size:18px;
}
</style>
</head>
<body>

<div class="container">

    <div class="card">

        <div class="title">
            🎙 مصاحبه اختصاصی
        </div>

        <div class="text">
            مصاحبه مفصل با مهدیار فرهادی، مدیر روابط عمومی باشگاه،
            درباره آخرین اتفاقات و وضعیت فعلی باشگاه ستاره سرخ فرهاد.
        </div>

        <audio controls>
            <source src="https://cdn.imgurl.ir/uploads/606722_M22.m4a" type="audio/mp4">
            مرورگر شما از پخش صوت پشتیبانی نمی‌کند.
        </audio>

        <div class="footer">
            🌐 روابط عمومی باشگاه ستاره سرخ فرهاد
        </div>

    </div>

</div>

</body>
</html>
